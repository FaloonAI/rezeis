# ════════════════════════════════════════════════════════════════════════════
#  Traefik (combined) — ОДИН reverse proxy для rezeis + reiwa на ОДНОМ VPS
#  443-only, свой сертификат (bring-your-own, напр. SAN-cert от acme.sh).
#  БЕЗ встроенного ACME — порт 80 не используется вообще.
#
#     PANEL_DOMAIN  →  rezeis:8000   (админка)
#     APP_DOMAIN    →  reiwa:5000    (кабинет / Mini App / webApp бота)
#
#  Выпуск SAN-сертификата (80 нужен только на момент выпуска, traefik не запущен):
#     apt update && apt install -y socat
#     curl https://get.acme.sh | sh
#     ~/.acme.sh/acme.sh --issue --standalone \
#         -d PANEL_DOMAIN -d APP_DOMAIN \
#         --key-file       /opt/rezeis/traefik/privkey.key \
#         --fullchain-file /opt/rezeis/traefik/fullchain.pem
#
#  Запуск:
#     cp traefik.yml.example traefik.yml
#     cp config/dynamic.yml.example config/dynamic.yml   # подставить домены
#     docker compose up -d
# ════════════════════════════════════════════════════════════════════════════

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - remnawave-network
    ports:
      - '0.0.0.0:443:443'
    environment:
      - TZ=UTC
    volumes:
      - ./traefik.yml:/traefik.yml:ro
      - ./config:/config:ro
      - ./fullchain.pem:/certs/fullchain.pem:ro
      - ./privkey.key:/certs/privkey.key:ro
      - ./logs:/var/log/traefik
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  remnawave-network:
    name: remnawave-network
    external: true
