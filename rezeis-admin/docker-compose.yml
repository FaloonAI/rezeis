# ══════════════════════════════════════════════════════════════════════════════
#  rezeis — docker-compose (production)
#
#  Runs in remnawave-network so rezeis can reach remnawave:3000 directly
#  and the same reverse proxy (Traefik/Caddy) can route to rezeis:8000.
#
#  Usage:
#    docker compose up -d
#
#  Reverse proxy config (Traefik example):
#    service url: http://rezeis:8000
# ══════════════════════════════════════════════════════════════════════════════

services:
  rezeis:
    build: .
    container_name: rezeis
    hostname: rezeis
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_HOST=rezeis-db
      - DATABASE_URL=postgresql://rezeis:rezeis_secret@rezeis-db:5432/rezeis
      - REDIS_HOST=rezeis-redis
      - REDIS_PASSWORD=rezeis
      - NODE_ENV=production
      - BACKUP_LOCATION=/app/data/backups
    ports:
      - '127.0.0.1:8000:8000'
    volumes:
      - rezeis-data:/app/data
    depends_on:
      rezeis-db:
        condition: service_healthy
      rezeis-redis:
        condition: service_started
    networks:
      - remnawave-network

  rezeis-worker:
    build: .
    container_name: rezeis-worker
    hostname: rezeis-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_HOST=rezeis-db
      - DATABASE_URL=postgresql://rezeis:rezeis_secret@rezeis-db:5432/rezeis
      - REDIS_HOST=rezeis-redis
      - REDIS_PASSWORD=rezeis
      - NODE_ENV=production
      - RUID_PROCESS_ROLE=worker
      - BACKUP_LOCATION=/app/data/backups
    command: ["node", "dist/worker.js"]
    volumes:
      - rezeis-data:/app/data
    depends_on:
      rezeis-db:
        condition: service_healthy
      rezeis-redis:
        condition: service_started
    networks:
      - remnawave-network

  rezeis-db:
    image: postgres:16-alpine
    container_name: rezeis-db
    hostname: rezeis-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rezeis
      POSTGRES_PASSWORD: rezeis_secret
      POSTGRES_DB: rezeis
    volumes:
      - rezeis-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rezeis"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - remnawave-network

  rezeis-redis:
    image: redis:7-alpine
    container_name: rezeis-redis
    hostname: rezeis-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass rezeis
      --maxmemory 512mb
      --maxmemory-policy volatile-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - rezeis-redis-data:/data
    networks:
      - remnawave-network

volumes:
  rezeis-data:
  rezeis-db-data:
  rezeis-redis-data:

networks:
  remnawave-network:
    name: remnawave-network
    driver: bridge
    external: true
